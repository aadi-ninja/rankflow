<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RankFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #13131F;
      color: #E4E4F0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #3A3A52;
      background: rgba(30, 30, 46, 0.8);
      backdrop-filter: blur(20px);
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #6C5CE7, #00CEC9);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .brand {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #A29BFE, #00CEC9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .content {
      padding: 20px 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #9999B3;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .input {
      width: 100%;
      padding: 10px 14px;
      background: #1E1E2E;
      border: 1px solid #3A3A52;
      border-radius: 10px;
      color: #E4E4F0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input:focus {
      border-color: #6C5CE7;
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.15);
    }

    .input::placeholder {
      color: #9999B3;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, #6C5CE7, #4A3ABF);
      color: white;
    }
    .btn-primary:hover {
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
    }

    .btn-danger {
      background: linear-gradient(135deg, #FF6B6B, #EE5A24);
      color: white;
    }
    .btn-danger:hover {
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Active session card */
    .session-card {
      background: rgba(30, 30, 46, 0.7);
      border: 1px solid rgba(108, 92, 231, 0.2);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .session-topic {
      font-size: 15px;
      font-weight: 600;
      color: #00CEC9;
      margin-bottom: 4px;
    }

    .session-meta {
      font-size: 12px;
      color: #9999B3;
    }

    .clip-count {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 8px 12px;
      background: #1E1E2E;
      border-radius: 8px;
      font-size: 13px;
    }

    .clip-count-num {
      font-weight: 700;
      color: #A29BFE;
      font-size: 18px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #55EFC4;
      display: inline-block;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid #FF6B6B;
      color: #FF6B6B;
      padding: 10px;
      border-radius: 10px;
      font-size: 12px;
      margin-top: 10px;
    }

    .recent-clips {
      margin-top: 16px;
      margin-bottom: 16px;
      max-height: 180px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .clip-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1E1E2E;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #3A3A52;
      font-size: 12px;
    }

    .clip-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #E4E4F0;
      flex-grow: 1;
      margin-right: 10px;
    }

    .delete-clip-btn {
      background: rgba(255, 107, 107, 0.1);
      color: #FF6B6B;
      border: 1px solid transparent;
      border-radius: 4px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    
    .delete-clip-btn:hover {
      background: #FF6B6B;
      color: white;
    }
    
    .delete-clip-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3A3A52; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #6C5CE7; }

    .spacer { height: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">R</div>
    <span class="brand">RankFlow</span>
  </div>

  <div class="content">
    <!-- No Session State -->
    <div id="create-view">
      <p class="section-title">Create a Session</p>
      <input
        type="text"
        id="topic-input"
        class="input"
        placeholder="Topic name (e.g. Fastest Animals)"
      />
      <div class="spacer"></div>
      <button id="create-btn" class="btn btn-primary">🎬 Create Session</button>
    </div>

    <!-- Active Session State -->
    <div id="active-view" style="display: none;">
      <p class="section-title">
        <span class="status-dot"></span>&nbsp; Active Session
      </p>
      <div class="session-card">
        <div class="session-topic" id="session-topic"></div>
        <div class="session-meta" id="session-date"></div>
        <div class="clip-count">
          <span class="clip-count-num" id="clip-count">0</span>
          <span>clips saved</span>
        </div>
      </div>
      
      <div class="recent-clips" id="recent-clips-list">
        <!-- Clips injected by JS -->
      </div>
      
      <button id="end-btn" class="btn btn-danger">⏹ End Session</button>
    </div>

    <div id="error-box" class="error" style="display: none;"></div>
    
    <!-- Settings section -->
    <div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid #3A3A52;">
      <p style="font-size: 11px; color: #9999B3; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;">Account Sync</p>
      <div style="display: flex; gap: 6px;">
        <input type="password" id="sync-key" class="input" placeholder="Paste Sync Key here..." style="font-size: 11px; padding: 6px 10px;" />
        <button id="save-sync-btn" class="btn btn-secondary" style="padding: 6px 10px; font-size: 11px; white-space: nowrap;">Save</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
